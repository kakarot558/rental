{% extends 'base.html' %}
{% block title %}500 Server Error{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <div style="font-size:6rem;margin-bottom:1rem;">⚠️</div>
    <h1 style="font-size:4rem;font-weight:800;color:var(--danger);">500</h1>
    <h2 style="margin-bottom:1rem;">Internal Server Error</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
  </div>
</div>
{% endblock %}
