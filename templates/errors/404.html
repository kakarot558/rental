{% extends 'base.html' %}
{% block title %}404 Not Found{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <div style="font-size:6rem;margin-bottom:1rem;">🔍</div>
    <h1 style="font-size:4rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">404</h1>
    <h2 style="margin-bottom:1rem;">Page Not Found</h2>
    <p style="color:var(--text-muted);margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
  </div>
</div>
{% endblock %}
